<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Gallery | St. Mary's High School</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/stylesHomeEvents.css">
</head>

<body>

<!-- NAVBAR (same as events page) -->
<header>
  <div class="nav-container">
    <div class="brand">
      <img src="../images/logo.jpg" alt="SMHS Logo">
      <span>St. Mary’s High School</span>
    </div>

    
    <button class="mobile-nav-toggle" aria-label="Toggle Menu">
      ☰
    </button>

    <nav class="nav-links">
      <a href="/">Home</a>
      <a href="/events.html" class="active">Events</a>
      <a href="/admissions.html">Admissions</a>
    </nav>

    <a href="/login.html" class="login-btn">Login</a>
  </div>
</header>

<!-- EVENT HERO -->
<section class="event-hero">
  <h1 id="eventTitle"></h1>
  <p id="eventDesc"></p>
</section>

<!-- EVENT DETAIL -->
<section class="event-detail">
  <div class="event-detail-inner">

    <!-- LEFT: TEXT -->
    <div class="event-text">
      <h2>About This Event</h2>
      <p id="eventLongDesc"></p>

      <a href="/events.html" class="btn-secondary">
         Back to Events
      </a>
    </div>

    <!-- RIGHT: IMAGES -->
    <div class="event-gallery">
        <div class="gallery-hero">
            <img id="mainImage" alt="Event highlight">
        </div>

        <div class="gallery-grid" id="gallery"></div>
    </div>



  </div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span onclick="closeLightbox()">×</span>
  <img id="lightboxImg">
</div>


<!-- FOOTER -->
<footer class="ev-footer">
  <div style="font-size: 1rem; font-weight: 400; margin-top: 2px;">
    <a href="/terms.html" class="copyright-link">© 2026 St.Mary's High School</a>. All rights reserved.
  </div>
</footer>

<script>
// Mobile nav toggle
document.addEventListener("DOMContentLoaded", () => {
  const toggle = document.querySelector(".mobile-nav-toggle");
  const nav = document.querySelector(".nav-links");

  if (!toggle || !nav) return;

  toggle.addEventListener("click", () => {
    nav.classList.toggle("show");
    toggle.textContent = nav.classList.contains("show") ? "✕" : "☰";
  });
});

const events = {
  "sankranti-2026": {
    title: "Sankranti Celebrations 2026",
    shortDesc: "A vibrant celebration of culture, tradition, and joy.",
    longDesc: "Sankranti Celebrations 2026 was a grand and joyful cultural festival celebrated with great enthusiasm by students, teachers, and staff. The event highlighted the essence of Indian tradition, unity, and gratitude, marking the harvest season with vibrant decorations and meaningful activities. The school campus was transformed into a festive space adorned with colorful kites, traditional rangoli designs, banana leaves, and beautifully crafted banners reflecting the spirit of Sankranti.\n\nStudents actively participated in a wide range of cultural and traditional programs, including folk dances, festive songs, and group performances that showcased regional heritage and creativity. Special emphasis was placed on educating students about the cultural significance of Sankranti, promoting respect for traditions and values passed down through generations.\n\nThe celebrations fostered a sense of togetherness, teamwork, and cultural pride among students. Teachers and staff guided students throughout the event, ensuring active participation and joyful learning. Sankranti Celebrations 2026 was not only a festive occasion but also a memorable experience that strengthened cultural awareness, student engagement, and community bonding within the school.",
    images: ["../images/events/s-5.jpeg","../images/events/s-2.jpeg","../images/events/s-6.jpeg","../images/events/children.jpeg","../images/events/s-4.jpeg"]
    },
   "traditional-epic": {
    title: "Traditional Epic Celebration 2025–26",
    shortDesc: "A cultural showcase inspired by Indian epics and spiritual values.",
    longDesc: "The Traditional Epic Celebration 2025–26 was a culturally enriching event that brought India’s timeless epics and spiritual heritage to life through student performances. Students dressed as characters from great Indian epics, beautifully portraying mythological stories that emphasize values such as truth, courage, devotion, and righteousness.\n\nThe event provided students with an opportunity to understand and appreciate the moral teachings and cultural significance of Indian epics. Through creative costumes, expressive performances, and guided narration, students showcased their talents while learning important life lessons rooted in tradition.\n\nTeachers guided students throughout the preparation and presentation, ensuring both learning and enjoyment. The celebration encouraged cultural awareness, confidence, and respect for Indian heritage, making it a meaningful and memorable experience for everyone present.",
    images: [
        "../images/events/t-1.jpeg",
        "../images/events/t-2.jpeg",
        "../images/events/t-3.jpeg",
        "../images/events/t-4.jpeg",
        "../images/events/t-5.jpeg"
    ]
    },
   "national-mathematics-day": {
    title: "National Mathematics Day 2025",
    shortDesc: "Celebrating the joy of numbers, logic, and mathematical thinking.",
    longDesc: "National Mathematics Day 2025 was celebrated with enthusiasm to promote interest and understanding of mathematics among students. The event featured creative activities, visual displays, and student presentations that highlighted mathematical concepts in an engaging and enjoyable manner.\n\nStudents actively participated by showcasing charts, models, and concept-based demonstrations that simplified complex ideas and encouraged logical thinking. The celebration emphasized the importance of mathematics in daily life and academic learning, inspiring curiosity and problem-solving skills.\n\nTeachers guided students throughout the activities, ensuring meaningful learning experiences. National Mathematics Day fostered confidence, analytical skills, and a positive attitude towards mathematics, making it both educational and enjoyable for students.",
    images: [
        "../images/events/m-3.jpeg",
        "../images/events/m-1.jpeg",
        "../images/events/m-2.jpeg",
    ]
    },
    "twins-day-2025": {
    title: "Twins Day Celebration 2025–26",
    shortDesc: "A joyful celebration highlighting unity, creativity, and togetherness.",
    longDesc: "Twins Day Celebration 2025–26 was a fun-filled and engaging event that celebrated togetherness, coordination, and creativity among students. Children participated in pairs, dressed in matching outfits, symbolizing unity and harmony while expressing their individuality through coordinated performances.\n\nThe celebration encouraged teamwork, confidence, and joyful interaction among students. Activities and presentations were designed to promote friendship, cooperation, and positive peer relationships in a cheerful and inclusive environment.\n\nTeachers played an active role in guiding students and organizing the event smoothly. Twins Day Celebration brought smiles, laughter, and memorable moments, strengthening bonds among students and creating a lively atmosphere across the campus.",
    images: [
        "../images/events/tw-7.jpeg",
        "../images/events/tw-5.jpeg",
        "../images/events/tw-1.jpeg",
        "../images/events/tw-8.jpeg",
        "../images/events/tw-6.jpeg",
        "../images/events/tw-4.jpeg",
    ]
    }

};

const id = new URLSearchParams(location.search).get("id");
const event = events[id];

if (event) {
  document.getElementById("eventTitle").innerText = event.title;
  document.getElementById("eventDesc").innerText = event.shortDesc;
  document.getElementById("eventLongDesc").innerText = event.longDesc;

  const mainImage = document.getElementById("mainImage");
    mainImage.src = event.images[0];
    mainImage.onclick = () => openLightbox(event.images[0]);

    const gallery = document.getElementById("gallery");
    event.images.slice(1).forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        img.onclick = () => openLightbox(src);
        gallery.appendChild(img);
    });


}

function openLightbox(src) {
  document.getElementById("lightboxImg").src = src;
  document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
