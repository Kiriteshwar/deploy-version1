<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Info - St. Mary's Portal</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        .school-info-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-header h1 {
            margin: 0;
            font-size: 1.8rem;
            color: #333;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .back-btn {
            padding: 10px 20px;
            background-color: #757575;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .back-btn:hover {
            background-color: #616161;
        }

        .add-user-btn {
            padding: 10px 20px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .add-user-btn:hover {
            background-color: #43a047;
        }

        .filters-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 8px 16px;
            border: none;
            background-color: #e0e0e0;
            color: #333;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background-color: #bdbdbd;
        }

        .filter-btn.active {
            background-color: #1976d2;
            color: white;
        }

        .search-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            min-width: 280px;
            background: #fff;
        }

        .search-box:focus {
            outline: none;
            border-color: #1976d2;
        }

        .search-btn {
            padding: 10px 20px;
            background-color: #1976d2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .search-btn:hover {
            background-color: #1565c0;
        }

        .stats-container {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            min-width: 120px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .stat-card.students {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.3);
        }

        .stat-card.teachers {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
        }

        .stat-card.admins {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .users-table-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
        }

        .users-table th,
        .users-table td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .users-table th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #333;
        }

        .users-table tr:hover {
            background-color: #f8f9fa;
        }

        .role-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: capitalize;
        }

        .role-badge.student {
            background-color: #e8f5e9;
            color: #2e7d32;
        }

        .role-badge.teacher {
            background-color: #fff3e0;
            color: #e65100;
        }

        .role-badge.admin {
            background-color: #e3f2fd;
            color: #1565c0;
        }

        .view-btn {
            padding: 6px 12px;
            background-color: #1976d2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background-color 0.2s;
        }

        .view-btn:hover {
            background-color: #1565c0;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.3rem;
            color: #333;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
            padding: 0;
            line-height: 1;
        }

        .modal-close:hover {
            color: #333;
        }

        .modal-body {
            padding: 20px;
        }

        .detail-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 600;
            color: #666;
            min-width: 140px;
        }

        .detail-value {
            color: #333;
            flex: 1;
        }

        .section-title {
            font-weight: 600;
            color: #1976d2;
            margin: 16px 0 10px 0;
            padding-bottom: 6px;
            border-bottom: 2px solid #e3f2fd;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1976d2;
        }

        .form-row {
            display: flex;
            gap: 16px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .role-fields {
            display: none;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-top: 10px;
        }

        .role-fields.active {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 16px;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #43a047;
        }

        .submit-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .users-table-container {
                overflow-x: auto;
            }

            .users-table {
                min-width: 600px;
            }

            .search-box {
                min-width: 100%;
            }

            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>

<body>
    <div class="school-info-container">
        <div class="page-header">
            <h1>🏫 School Info</h1>
            <div class="header-buttons">
                <button class="add-user-btn" id="add-user-btn">➕ Add User</button>
                <button class="back-btn" onclick="window.location.href='dashboard.html'">← Back</button>
            </div>
        </div>

        <div class="stats-container">
            <div class="stat-card" id="total-stat">
                <div class="stat-number" id="total-count">-</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card students" id="students-stat">
                <div class="stat-number" id="students-count">-</div>
                <div class="stat-label">Students</div>
            </div>
            <div class="stat-card teachers" id="teachers-stat">
                <div class="stat-number" id="teachers-count">-</div>
                <div class="stat-label">Teachers</div>
            </div>
            <div class="stat-card admins" id="admins-stat">
                <div class="stat-number" id="admins-count">-</div>
                <div class="stat-label">Admins</div>
            </div>
        </div>

        <div class="filters-container">
            <button class="filter-btn active" data-role="all">All</button>
            <button class="filter-btn" data-role="student">Students</button>
            <button class="filter-btn" data-role="teacher">Teachers</button>
            <button class="filter-btn" data-role="admin">Admins</button>
        </div>

        <div class="search-container">
            <input type="text" class="search-box" id="search-input"
                placeholder="Search by name, email, phone, or roll number...">
            <button class="search-btn" id="search-btn">🔍 Search</button>
        </div>

        <div class="users-table-container">
            <table class="users-table">
                <thead>
                    <tr>
                        <th>Roll No</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Role</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="users-table-body">
                    <tr>
                        <td colspan="6" class="no-data">Loading users...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- User Details Modal -->
    <div class="modal-overlay" id="user-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">User Details</h2>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- User details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Add User Modal -->
    <div class="modal-overlay" id="add-user-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New User</h2>
                <button class="modal-close" id="add-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="add-user-form">
                    <div class="section-title">Basic Information</div>

                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" id="new-name" required placeholder="Enter full name">
                    </div>

                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="new-email" required placeholder="Enter email address">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Phone *</label>
                            <input type="tel" id="new-phone" required placeholder="Enter phone number">
                        </div>
                        <div class="form-group">
                            <label>Password *</label>
                            <input type="password" id="new-password" required placeholder="Enter password">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Role *</label>
                        <select id="new-role" required>
                            <option value="">Select Role</option>
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <!-- Student Fields -->
                    <div class="role-fields" id="student-fields">
                        <div class="section-title">Student Information</div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Class *</label>
                                <input type="text" id="new-class" placeholder="e.g. X, IX">
                            </div>
                            <div class="form-group">
                                <label>Section *</label>
                                <input type="text" id="new-section" placeholder="e.g. A, B">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Roll Number *</label>
                            <input type="text" id="new-roll" placeholder="Enter roll number">
                        </div>
                        <div class="form-group">
                            <label>Guardian Name</label>
                            <input type="text" id="new-guardian" placeholder="Enter guardian name">
                        </div>
                        <div class="form-group">
                            <label>Guardian Phone</label>
                            <input type="tel" id="new-guardian-phone" placeholder="Enter guardian phone">
                        </div>
                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" id="new-address" placeholder="Enter address">
                        </div>
                    </div>

                    <!-- Teacher Fields -->
                    <div class="role-fields" id="teacher-fields">
                        <div class="section-title">Teacher Information</div>
                        <div class="form-group">
                            <label>Subjects (comma separated)</label>
                            <input type="text" id="new-subjects" placeholder="e.g. Mathematics, Physics">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Class Teacher Of (Class)</label>
                                <input type="text" id="new-ct-class" placeholder="e.g. X">
                            </div>
                            <div class="form-group">
                                <label>Class Teacher Of (Section)</label>
                                <input type="text" id="new-ct-section" placeholder="e.g. A">
                            </div>
                        </div>
                    </div>

                    <!-- Admin Fields -->
                    <div class="role-fields" id="admin-fields">
                        <div class="section-title">Admin Information</div>
                        <div class="form-group">
                            <label>Designation</label>
                            <input type="text" id="new-designation" placeholder="e.g. Principal, Coordinator">
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="submit-user-btn">Add User</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/school-info.js"></script>
</body>

</html>
