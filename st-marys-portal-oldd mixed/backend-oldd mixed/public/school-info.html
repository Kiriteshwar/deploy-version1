<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Info - St. Mary's Portal</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        .school-info-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-header h1 {
            margin: 0;
            font-size: 1.8rem;
            color: #333;
        }

        .back-btn {
            padding: 10px 20px;
            background-color: #1976d2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .back-btn:hover {
            background-color: #1565c0;
        }

        .filters-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 8px 16px;
            border: none;
            background-color: #e0e0e0;
            color: #333;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background-color: #bdbdbd;
        }

        .filter-btn.active {
            background-color: #1976d2;
            color: white;
        }

        .search-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            min-width: 280px;
            background: #fff;
        }

        .search-box:focus {
            outline: none;
            border-color: #1976d2;
        }

        .search-btn {
            padding: 10px 20px;
            background-color: #1976d2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .search-btn:hover {
            background-color: #1565c0;
        }

        .stats-container {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            min-width: 120px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .stat-card.students {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.3);
        }

        .stat-card.teachers {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
        }

        .stat-card.admins {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .users-table-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
        }

        .users-table th,
        .users-table td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .users-table th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #333;
        }

        .users-table tr:hover {
            background-color: #f8f9fa;
        }

        .role-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: capitalize;
        }

        .role-badge.student {
            background-color: #e8f5e9;
            color: #2e7d32;
        }

        .role-badge.teacher {
            background-color: #fff3e0;
            color: #e65100;
        }

        .role-badge.admin {
            background-color: #e3f2fd;
            color: #1565c0;
        }

        .view-btn {
            padding: 6px 12px;
            background-color: #1976d2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background-color 0.2s;
        }

        .view-btn:hover {
            background-color: #1565c0;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.3rem;
            color: #333;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
            padding: 0;
            line-height: 1;
        }

        .modal-close:hover {
            color: #333;
        }

        .modal-body {
            padding: 20px;
        }

        .detail-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 600;
            color: #666;
            min-width: 140px;
        }

        .detail-value {
            color: #333;
            flex: 1;
        }

        .section-title {
            font-weight: 600;
            color: #1976d2;
            margin: 16px 0 10px 0;
            padding-bottom: 6px;
            border-bottom: 2px solid #e3f2fd;
        }

        @media (max-width: 768px) {
            .users-table-container {
                overflow-x: auto;
            }

            .users-table {
                min-width: 600px;
            }

            .search-box {
                min-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="school-info-container">
        <div class="page-header">
            <h1>🏫 School Info</h1>
            <button class="back-btn" onclick="window.location.href='dashboard.html'">← Back to Dashboard</button>
        </div>

        <div class="stats-container">
            <div class="stat-card" id="total-stat">
                <div class="stat-number" id="total-count">-</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card students" id="students-stat">
                <div class="stat-number" id="students-count">-</div>
                <div class="stat-label">Students</div>
            </div>
            <div class="stat-card teachers" id="teachers-stat">
                <div class="stat-number" id="teachers-count">-</div>
                <div class="stat-label">Teachers</div>
            </div>
            <div class="stat-card admins" id="admins-stat">
                <div class="stat-number" id="admins-count">-</div>
                <div class="stat-label">Admins</div>
            </div>
        </div>

        <div class="filters-container">
            <button class="filter-btn active" data-role="all">All</button>
            <button class="filter-btn" data-role="student">Students</button>
            <button class="filter-btn" data-role="teacher">Teachers</button>
            <button class="filter-btn" data-role="admin">Admins</button>
        </div>

        <div class="search-container">
            <input type="text" class="search-box" id="search-input"
                placeholder="Search by name, email, phone, or roll number...">
            <button class="search-btn" id="search-btn">🔍 Search</button>
        </div>

        <div class="users-table-container">
            <table class="users-table">
                <thead>
                    <tr>
                        <th>Roll No</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Role</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="users-table-body">
                    <tr>
                        <td colspan="6" class="no-data">Loading users...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- User Details Modal -->
    <div class="modal-overlay" id="user-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">User Details</h2>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- User details will be loaded here -->
            </div>
        </div>
    </div>

    <script src="js/school-info.js"></script>
</body>

</html>
